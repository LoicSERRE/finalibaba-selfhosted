# Local development — starts PostgreSQL only.
# The Next.js app runs with `npm run dev` directly on your machine.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   npm run dev

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: finalibaba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d finalibaba"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data_dev:
